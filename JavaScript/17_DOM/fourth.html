
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM learning</title>
    
</head>
<body>
<ul class="languages">
    <li>JavaScript</li>
</ul>

</body>

<script>
function addlang(lang){
    const li =document.createElement('li')
    li.innerText = `${lang}`
    document.querySelector('.languages').appendChild(li)

}
addlang("python")

//optimised approach of adding element

function addlang1(lang){
    const li = document.createElement('li')
    li.appendChild(document.createTextNode(lang))
    document.querySelector('.languages').appendChild(li)
}
addlang1("Java")


//Editing Element
const slang = document.querySelector("li:nth-child(2)")
const newli = document.createElement('li')
newli.textContent="typescript"
slang.replaceWith(newli)

//Another editing method
const replace = document.querySelector("li:nth-child(1)")
replace.outerHTML='<li> C++</li>'
 
//Remove
const last = document.querySelector("li:last-child") // we can only write "li:first-child" or "li:last-child"
last.remove()

</script>
</html>
